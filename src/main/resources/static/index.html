<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彩票预测分析系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f1419;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f4f8;
            --text-secondary: #94a3b8;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent-glow: rgba(245, 158, 11, 0.25);
            --success: #34d399;
            --fail: #f87171;
            --purple: #818cf8;
            --purple-dark: #6366f1;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            --page-pad: 10px;
            --row-h: 52px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-deep);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.18), transparent),
                radial-gradient(ellipse 50% 40% at 100% 100%, rgba(245, 158, 11, 0.08), transparent);
            color: var(--text-primary);
            padding: var(--page-pad);
            line-height: 1.45;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--page-pad) * 2);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .header-left h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-left p { display: none; }

        .header-right {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .main-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            padding: 5px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            flex-shrink: 0;
        }

        .main-tab {
            flex: 1;
            padding: 10px 14px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            border: none;
            background: transparent;
        }

        .main-tab:hover { color: var(--text-primary); background: var(--bg-card-hover); }
        .main-tab.active {
            background: linear-gradient(135deg, var(--purple-dark), var(--purple));
            color: white;
        }

        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }
        .tab-content.active { display: flex; }

        /* 子 Tab + 最新开奖 同一行 */
        .tab-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .sub-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }

        .sub-tab {
            padding: 8px 16px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .latest-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid var(--border);
            border-radius: 22px;
            flex-shrink: 0;
        }

        .latest-bar-label {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .latest-numbers {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .number-ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent-light), var(--accent));
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 3px 10px var(--accent-glow);
        }

        .period-info {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            margin-left: 2px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-light);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .panel-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .filter-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .auto-refresh {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .auto-refresh input { width: 15px; height: 15px; accent-color: var(--purple); cursor: pointer; }

        .compare-tab {
            padding: 7px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* 表格：10 期铺满模式 / 超出滚动模式 */
        .table-container {
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            flex: 1;
            min-height: 0;
        }

        .table-container.fill-mode {
            overflow: hidden;
        }

        .table-container.fill-mode tbody tr {
            height: var(--row-h);
        }

        .table-container.fill-mode td {
            vertical-align: middle;
        }

        .table-container.scroll-mode {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table-container.scroll-mode tbody tr {
            height: auto;
        }

        .table-container.table-fixed {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table-container.table-fixed th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #1a2030;
        }

        .error-message { color: var(--fail); }

        .period-info span { color: var(--accent-light); }

        .section-panel {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }
        .section-panel.active { display: flex; }

        .sub-tab:hover { border-color: var(--purple); color: var(--text-primary); }
        .sub-tab.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--purple);
            color: var(--purple);
        }

        .filter-section {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 0;
        }

        .filter-btn:hover { border-color: var(--purple); color: var(--text-primary); }
        .filter-btn.active {
            background: var(--purple);
            border-color: var(--purple);
            color: white;
        }

        .compare-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 0;
        }

        .compare-tab:hover { border-color: var(--purple); }
        .compare-tab.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--purple);
            color: var(--purple);
        }

        th {
            padding: 10px 10px;
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            background: #1a2030;
        }

        .table-container.scroll-mode th {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            padding: 0 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-primary);
        }

        .ball-small {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--purple), var(--purple-dark));
            color: white;
            margin: 2px;
            font-weight: 600;
            font-size: 14px;
        }

        .dingwei-text { font-size: 13px; text-align: left; }
        .dingwei-row { display: flex; align-items: center; margin-bottom: 3px; flex-wrap: wrap; }
        .dingwei-label { font-weight: 600; color: var(--purple); min-width: 42px; font-size: 12px; }
        .dingwei-ball {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--purple), var(--purple-dark));
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: var(--bg-card-hover); }
        tbody tr:last-child td { border-bottom: none; }

        .success { color: var(--success); font-weight: 600; }
        .fail { color: var(--fail); font-weight: 600; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        .ball-small.highlight {
            background: linear-gradient(145deg, var(--accent-light), var(--accent));
            color: #1a1a2e;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .dingwei-numbers { flex: 1; display: flex; flex-wrap: wrap; gap: 3px; }

        thead { background: rgba(99, 102, 241, 0.15); }

        .panel-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-scroll .tracker-result-block {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .panel-scroll .tracker-result-header {
            flex-shrink: 0;
        }

        .panel-scroll .table-container.table-fixed {
            flex: none;
            overflow: visible;
            min-height: auto;
        }

        /* History trend badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-sum { background: rgba(245,158,11,0.15); color: var(--accent-light); }
        .badge-ratio { background: rgba(99,102,241,0.15); color: var(--purple); }
        .badge-span { background: rgba(52,211,153,0.15); color: var(--success); }

        /* 七码命中位次统计 */
        .qima-pos-panel {
            flex-shrink: 0;
            margin-bottom: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
        }

        .qima-pos-summary {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 13px;
        }

        .qima-pos-summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qima-pos-summary-item .pos-label {
            font-weight: 600;
            color: var(--purple);
            white-space: nowrap;
        }

        .qima-pos-summary-item .pos-vals {
            color: var(--accent-light);
            font-weight: 600;
        }

        .period-cell { font-weight: 600; color: var(--text-secondary); font-size: 12px; }

        /* Number tracker panel */
        .tracker-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            flex-shrink: 0;
        }

        .tracker-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .tracker-desc { display: none; }

        .tracker-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            min-width: 90px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--purple);
        }

        .form-group select option { background: #1e293b; }

        .form-group input.track-number {
            width: 90px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 6px;
            text-align: center;
            font-family: 'Noto Sans SC', monospace;
        }

        .tracker-result-block {
            flex-shrink: 0;
        }

        .tracker-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 6px;
        }

        .tracker-result-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .tracker-result-meta strong {
            color: var(--accent-light);
            font-weight: 600;
        }

        .match-tag-exact {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
        }

        .match-tag-group {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(129, 140, 248, 0.15);
            color: var(--purple);
        }

        .distance-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-light);
        }

        .distance-current {
            background: rgba(52, 211, 153, 0.2);
            color: var(--success);
        }

        .btn-primary {
            padding: 7px 16px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--purple-dark), var(--purple));
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .tracker-summary {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 8px;
            flex-shrink: 0;
        }

        .summary-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 4px;
            text-align: center;
        }

        .summary-item .val { font-size: 16px; font-weight: 700; color: var(--accent-light); line-height: 1.2; }
        .summary-item .lbl { font-size: 10px; color: var(--text-secondary); }

        .loading, .error-message, .empty-hint {
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 13px;
            background: var(--accent);
            border-radius: 2px;
        }

        .history-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            body { padding: 6px; --page-pad: 6px; }
            .header { padding: 10px 14px; }
            .header-left h1 { font-size: 17px; }
            .tab-header { flex-direction: column; align-items: stretch; }
            .latest-bar { justify-content: center; }
            .stats { grid-template-columns: repeat(3, 1fr); }
            .tracker-summary { grid-template-columns: repeat(3, 1fr); }
            .panel-toolbar { flex-direction: column; align-items: stretch; }
            .auto-refresh { margin-left: 0; }
            .toolbar-divider { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>彩票预测分析系统</h1>
            <p>AI 智能预测 · 历史走势 · 号码追踪</p>
        </div>
        <div class="header-right" id="last-update">加载中...</div>
    </div>

    <div class="main-tabs">
        <button class="main-tab active" data-type="3d" onclick="switchMainTab('3d', this)">福彩 3D</button>
        <button class="main-tab" data-type="pl3" onclick="switchMainTab('pl3', this)">排列三</button>
    </div>

    <!-- 3D -->
    <div id="sd-content" class="tab-content active">
        <div class="tab-header">
            <div class="sub-tabs">
                <button class="sub-tab active" onclick="switchSection('3d', 'predict', this)">AI 预测</button>
                <button class="sub-tab" onclick="switchSection('3d', 'history', this)">历史走势</button>
                <button class="sub-tab" onclick="switchSection('3d', 'tracker', this)">号码追踪</button>
            </div>
            <div class="latest-bar">
                <span class="latest-bar-label">最新</span>
                <div class="latest-numbers" id="sd-latest"><div class="loading">…</div></div>
            </div>
        </div>

        <!-- AI 预测 -->
        <div id="sd-predict" class="section-panel active">
            <div class="stats" id="sd-stats"></div>
            <div class="panel-toolbar">
                <div class="filter-section">
                    <button class="filter-btn active" onclick="setFilter('3d', 10, this)">近10期</button>
                    <button class="filter-btn" onclick="setFilter('3d', 30, this)">近30期</button>
                    <button class="filter-btn" onclick="setFilter('3d', 50, this)">近50期</button>
                    <div class="auto-refresh">
                        <label for="auto-refresh-3d">自动刷新</label>
                        <input type="checkbox" id="auto-refresh-3d" onchange="toggleAutoRefresh('3d')">
                    </div>
                </div>
                <div class="toolbar-divider"></div>
                <div class="compare-tabs">
                    <button class="compare-tab active" onclick="switchCompareTab('3d', 'sanma', this)">三码</button>
                    <button class="compare-tab" onclick="switchCompareTab('3d', 'qima', this)">七码</button>
                </div>
            </div>
            <div class="qima-pos-panel" id="sd-qima-pos" style="display:none">
                <div class="qima-pos-summary" id="sd-qima-pos-summary"></div>
            </div>
            <div class="table-container fill-mode" id="sd-predict-table">
                <table>
                    <thead><tr><th>AI 预测</th><th>实际开奖</th><th>匹配结果</th></tr></thead>
                    <tbody id="sd-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 历史走势 -->
        <div id="sd-history" class="section-panel">
            <div class="history-toolbar">
                <div class="section-title">历史走势</div>
                <div class="filter-section">
                    <button class="filter-btn active" onclick="setHistoryFilter('3d', 30, this)">近30期</button>
                    <button class="filter-btn" onclick="setHistoryFilter('3d', 50, this)">近50期</button>
                    <button class="filter-btn" onclick="setHistoryFilter('3d', 100, this)">近100期</button>
                    <button class="filter-btn" onclick="setHistoryFilter('3d', 0, this)">全部</button>
                </div>
            </div>
            <div class="table-container scroll-mode" id="sd-history-table">
                <table>
                    <thead>
                    <tr>
                        <th>期号</th>
                        <th>开奖号码</th>
                        <th>和值</th>
                        <th>跨度</th>
                        <th>大小比</th>
                        <th>奇偶比</th>
                    </tr>
                    </thead>
                    <tbody id="sd-history-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 号码追踪 -->
        <div id="sd-tracker" class="section-panel">
            <div class="tracker-panel">
                <div class="tracker-form">
                    <div class="form-group">
                        <label>三位数</label>
                        <input class="track-number" id="sd-track-number" type="text" maxlength="3" placeholder="123" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label>范围</label>
                        <select id="sd-track-periods">
                            <option value="30">近30期</option>
                            <option value="50">近50期</option>

    <!-- 排列三 -->
    <div id="pl3-content" class="tab-content">
        <div class="tab-header">

                <button class="sub-tab active" onclick="switchSection('pl3', 'predict', this)">AI 预测</button>
                <button class="sub-tab" onclick="switchSection('pl3', 'history', this)">历史走势</button>
                <button class="sub-tab" onclick="switchSection('pl3', 'tracker', this)">号码追踪</button>
            </div>
            <div class="latest-bar">
                <span class="latest-bar-label">最新</span>
                <div class="latest-numbers" id="pl3-latest"><div class="loading">…</div></div>
            </div>
        </div>

        <div id="pl3-predict" class="section-panel active">
            <div class="stats" id="pl3-stats"></div>
            <div class="panel-toolbar">

                    <button class="filter-btn active" onclick="setFilter('pl3', 10, this)">近10期</button>
                    <button class="filter-btn" onclick="setFilter('pl3', 30, this)">近30期</button>

                        <label>范围</label>
                        <select id="pl3-track-periods">
                            <option value="30">近30期</option>
                            <option value="50">近50期</option>
                            <option value="100" selected>近100期</option>
                            <option value="0">全部</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="runTracker('pl3')">查询</button>
                </div>
                <div class="tracker-summary" id="pl3-tracker-summary" style="display:none"></div>
            </div>
            <div class="panel-scroll">
                <div class="tracker-result-block">
                    <div class="tracker-result-header">
                        <div class="section-title">直选 · 位置一致</div>
                        <div class="tracker-result-meta" id="pl3-exact-meta"></div>
                    </div>
                    <div class="table-container table-fixed">
                        <table>
                            <thead><tr><th>期号</th><th>开奖号码</th><th>距当期</th></tr></thead>
                            <tbody id="pl3-exact-body">
                            <tr><td colspan="3" class="empty-hint">输入三位数后查询</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="tracker-result-block">
                    <div class="tracker-result-header">
                        <div class="section-title">组选 · 顺序不同</div>
                        <div class="tracker-result-meta" id="pl3-group-meta"></div>
                    </div>
                    <div class="table-container table-fixed">
                        <table>
                            <thead><tr><th>期号</th><th>开奖号码</th><th>距当期</th></tr></thead>
                            <tbody id="pl3-group-body">
                            <tr><td colspan="3" class="empty-hint">输入三位数后查询</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentData = { sd: [], pl3: [], sdCompare: [], pl3Compare: [] };
    let filters = { '3d': 10, 'pl3': 10 };
    let historyFilters = { '3d': 30, 'pl3': 30 };
    let compareTabs = { '3d': 'sanma', 'pl3': 'sanma' };
    let sections = { '3d': 'predict', 'pl3': 'predict' };
    let autoRefreshIntervals = { '3d': null, 'pl3': null };

    /** 3d 对应 DOM 前缀 sd，避免 ID 以数字开头导致 querySelector 报错 */
    function domPrefix(type) {
        return type === '3d' ? 'sd' : 'pl3';
    }

    function $(type, suffix) {
        return document.getElementById(domPrefix(type) + '-' + suffix);
    }

    function toDrawStr(item) {
        return String(item.q1 ?? '') + String(item.q2 ?? '') + String(item.q3 ?? '');
    }

    function sortedDigits(str) {
        return str.split('').sort().join('');
    }

    function isExactMatch(drawStr, target) {
        return drawStr === target;
    }

    function isGroupMatch(drawStr, target) {
        return sortedDigits(drawStr) === sortedDigits(target) && drawStr !== target;
    }

    function formatDistance(distance) {
        if (distance === 0) return '<span class="distance-badge distance-current">当期</span>';
        return `<span class="distance-badge">${distance} 期前</span>`;
    }

    function renderTrackerTable(type, suffix, matches, target) {
        const tbody = document.getElementById(domPrefix(type) + '-' + suffix + '-body');
        tbody.innerHTML = '';
        if (matches.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty-hint">查询范围内未出现</td></tr>';
            return;
        }
        matches.forEach(({ item, distance }) => {
            const drawStr = toDrawStr(item);
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="period-cell">${item.qh ?? '-'}</td>
                <td>${formatBalls(drawStr.split('').join(','), null)}</td>
                <td>${formatDistance(distance)}</td>`;
            tbody.appendChild(row);
        });
    }

    function renderTrackerMeta(type, suffix, matches) {
        const metaEl = document.getElementById(domPrefix(type) + '-' + suffix + '-meta');
        if (matches.length === 0) {
            metaEl.innerHTML = '共 <strong>0</strong> 次';
            return;
        }
        const nearest = matches[0].distance;
        const nearestText = nearest === 0 ? '当期' : nearest + ' 期前';
        metaEl.innerHTML = `共 <strong>${matches.length}</strong> 次 · 最近 <strong>${nearestText}</strong>`;
    }

    function switchMainTab(type, el) {
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        $(type, 'content').classList.add('active');
        adjustAllTables();
    }

    function switchSection(type, section, el) {
        sections[type] = section;
        const container = el.parentElement;
        container.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const contentEl = $(type, 'content');
        contentEl.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
        $(type, section).classList.add('active');
        if (section === 'history') renderHistory(type);
        adjustAllTables();
    }

    function adjustPredictTable(type) {
        const container = document.getElementById(domPrefix(type) + '-predict-table');
        if (!container || !$(type, 'predict').classList.contains('active')) return;

        const useFill = filters[type] <= 10 && compareTabs[type] === 'sanma';
        applyTableFill(container, useFill, 10);
    }

    function adjustHistoryTable(type) {
        const container = document.getElementById(domPrefix(type) + '-history-table');
        if (!container || !$(type, 'history').classList.contains('active')) return;

        const count = historyFilters[type];
        const useFill = count > 0 && count <= 10;
        applyTableFill(container, useFill, count || 10);
    }

    function applyTableFill(container, useFill, rowCount) {
        if (useFill) {
            container.classList.add('fill-mode');
            container.classList.remove('scroll-mode');
            const theadH = container.querySelector('thead')?.offsetHeight || 42;
            const bottomPad = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--page-pad')) || 10;
            const available = window.innerHeight - container.getBoundingClientRect().top - bottomPad;
            const rowH = Math.max(44, Math.floor((available - theadH) / rowCount));
            container.style.setProperty('--row-h', rowH + 'px');
        } else {
            container.classList.remove('fill-mode');
            container.classList.add('scroll-mode');
            container.style.removeProperty('--row-h');
        }
    }

    function adjustAllTables() {
        requestAnimationFrame(() => {
            ['3d', 'pl3'].forEach(type => {
                adjustPredictTable(type);
                adjustHistoryTable(type);
            });
        });
    }

    function setFilter(type, count, el) {
        filters[type] = count;
        el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderTable(type);
    }

    function setHistoryFilter(type, count, el) {
        historyFilters[type] = count;
        el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderHistory(type);
    }

    function switchCompareTab(type, tab, el) {
        compareTabs[type] = tab;
        el.parentElement.querySelectorAll('.compare-tab').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderTable(type);
    }

    function toggleAutoRefresh(type) {
        const checkbox = document.getElementById('auto-refresh-' + type);
        if (checkbox.checked) {
            autoRefreshIntervals[type] = setInterval(loadData, 30000);
        } else if (autoRefreshIntervals[type]) {
            clearInterval(autoRefreshIntervals[type]);
            autoRefreshIntervals[type] = null;
        }
    }

    function getHistoryData(type) {
        const data = type === '3d' ? currentData.sd : currentData.pl3;
        return Array.isArray(data) ? data : [];
    }

    function calcSum(q1, q2, q3) {
        return parseInt(q1) + parseInt(q2) + parseInt(q3);
    }

    function calcBigSmallRatio(q1, q2, q3) {
        const nums = [q1, q2, q3].map(Number);
        const big = nums.filter(n => n >= 5).length;
        const small = 3 - big;
        return big + ':' + small;
    }

    function calcOddEvenRatio(q1, q2, q3) {
        const nums = [q1, q2, q3].map(Number);
        const odd = nums.filter(n => n % 2 === 1).length;
        const even = 3 - odd;
        return odd + ':' + even;
    }

    function calcSpan(q1, q2, q3) {
        const nums = [q1, q2, q3].map(Number).filter(n => !isNaN(n));
        if (nums.length !== 3) return '-';
        return Math.max(...nums) - Math.min(...nums);
    }

    function parseDingWeiNumbers(aiDingWeiHm) {
        const result = { bai: [], shi: [], ge: [] };
        if (!aiDingWeiHm) return result;
        const bai = aiDingWeiHm.match(/百位[:：]([0-9,]+)/);
        const shi = aiDingWeiHm.match(/十位[:：]([0-9,]+)/);
        const ge = aiDingWeiHm.match(/个位[:：]([0-9,]+)/);
        if (bai) result.bai = bai[1].split(',').map(s => s.trim());
        if (shi) result.shi = shi[1].split(',').map(s => s.trim());
        if (ge) result.ge = ge[1].split(',').map(s => s.trim());
        return result;
    }

    function getDigitPosition(digits, target) {
        const idx = digits.indexOf(String(target));
        return idx >= 0 ? idx + 1 : -1;
    }

    function getQimaMatchPositions(aiDingWeiHm, realHm) {
        if (!checkDingWeiMatch(aiDingWeiHm, realHm)) return null;
        const pos = parseDingWeiNumbers(aiDingWeiHm);
        return {
            bai: getDigitPosition(pos.bai, realHm[0]),
            shi: getDigitPosition(pos.shi, realHm[1]),
            ge: getDigitPosition(pos.ge, realHm[2])
        };
    }

    function sortPosSet(set) {
        return [...set].filter(n => n > 0).sort((a, b) => a - b).join(',') || '—';
    }

    function renderQimaPosStats(type, compareData) {
        const panel = document.getElementById(domPrefix(type) + '-qima-pos');
        const summaryEl = document.getElementById(domPrefix(type) + '-qima-pos-summary');
        if (!panel) return;

        if (compareTabs[type] !== 'qima') {
            panel.style.display = 'none';
            return;
        }
        panel.style.display = 'block';

        const hits = compareData.filter(item => checkDingWeiMatch(item.aiDingWeiHm, item.realHm));
        const baiSet = new Set(), shiSet = new Set(), geSet = new Set();

        hits.forEach(item => {
            const p = getQimaMatchPositions(item.aiDingWeiHm, item.realHm);
            baiSet.add(p.bai);
            shiSet.add(p.shi);
            geSet.add(p.ge);
        });

        if (hits.length === 0) {
            summaryEl.innerHTML = '<span style="color:var(--text-secondary);font-size:13px">当前范围内无七码命中记录</span>';
            return;
        }

        summaryEl.innerHTML = `
            <div class="qima-pos-summary-item"><span class="pos-label">百位</span><span class="pos-vals">${sortPosSet(baiSet)}</span></div>
            <div class="qima-pos-summary-item"><span class="pos-label">十位</span><span class="pos-vals">${sortPosSet(shiSet)}</span></div>
            <div class="qima-pos-summary-item"><span class="pos-label">个位</span><span class="pos-vals">${sortPosSet(geSet)}</span></div>
            <div class="qima-pos-summary-item"><span class="pos-label">命中</span><span class="pos-vals">${hits.length} 期</span></div>`;
    }

    function checkMatch(aiHm, realHm) {
        if (!aiHm || !realHm) return false;
        return aiHm.split(',').includes(realHm);
    }

    function checkDingWeiMatch(aiDingWeiHm, realHm) {
        if (!aiDingWeiHm || !realHm || realHm.length !== 3) return false;
        const baiweiMatch = aiDingWeiHm.match(/百位[:：]([0-9,]+)/);
        const shiweiMatch = aiDingWeiHm.match(/十位[:：]([0-9,]+)/);
        const geweiMatch = aiDingWeiHm.match(/个位[:：]([0-9,]+)/);
        if (!baiweiMatch || !shiweiMatch || !geweiMatch) return false;
        return baiweiMatch[1].split(',').includes(realHm[0])
            && shiweiMatch[1].split(',').includes(realHm[1])
            && geweiMatch[1].split(',').includes(realHm[2]);
    }

    function formatBalls(numbers, highlight) {
        if (!numbers) return '-';
        return numbers.split(',').map(num => {
            const trimmed = num.trim();
            const cls = highlight && trimmed === highlight ? 'ball-small highlight' : 'ball-small';
            return `<span class="${cls}">${trimmed}</span>`;
        }).join('');
    }

    function formatDingWei(text) {
        if (!text) return '-';
        const lines = text.split('\n').filter(l => l.trim());
        let html = '<div class="dingwei-text">';
        lines.forEach(line => {
            [['百位', /百位[:：]([0-9,]+)/], ['十位', /十位[:：]([0-9,]+)/], ['个位', /个位[:：]([0-9,]+)/]].forEach(([label, regex]) => {
                const m = line.match(regex);
                if (m) {
                    html += `<div class="dingwei-row"><span class="dingwei-label">${label}:</span><div class="dingwei-numbers">`;
                    m[1].split(',').forEach(num => { html += `<span class="dingwei-ball">${num.trim()}</span>`; });
                    html += '</div></div>';
                }
            });
        });
        return html + '</div>';
    }

    function renderLatest(type, latest) {
        const el = $(type, 'latest');
        if (!latest) { el.innerHTML = '<span class="period-info">暂无</span>'; return; }
        el.innerHTML = `
            <div class="number-ball">${latest.q1 ?? '-'}</div>
            <div class="number-ball">${latest.q2 ?? '-'}</div>
            <div class="number-ball">${latest.q3 ?? '-'}</div>
            <div class="period-info">第<span>${latest.qh ?? '-'}</span>期</div>
        `;
    }

    function renderStats(type, compareData) {
        const el = $(type, 'stats');
        let sanmaSuccess = 0, qimaSuccess = 0;
        const total = compareData.length;
        const sanmaTotal = compareData.filter(i => i.aiHm).length;
        const qimaTotal = compareData.filter(i => i.aiDingWeiHm).length;
        compareData.forEach(item => {
            if (checkMatch(item.aiHm, item.realHm)) sanmaSuccess++;
            if (checkDingWeiMatch(item.aiDingWeiHm, item.realHm)) qimaSuccess++;
        });
        const sanmaRate = sanmaTotal > 0 ? ((sanmaSuccess / sanmaTotal) * 100).toFixed(1) : 0;
        const qimaRate = qimaTotal > 0 ? ((qimaSuccess / qimaTotal) * 100).toFixed(1) : 0;
        el.innerHTML = `
            <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">总期数</div></div>
            <div class="stat-card"><div class="stat-value">${sanmaSuccess}</div><div class="stat-label">三码命中</div></div>
            <div class="stat-card"><div class="stat-value">${sanmaRate}%</div><div class="stat-label">三码命中率</div></div>
            <div class="stat-card"><div class="stat-value">${qimaSuccess}</div><div class="stat-label">七码命中</div></div>
            <div class="stat-card"><div class="stat-value">${qimaRate}%</div><div class="stat-label">七码命中率</div></div>
        `;
    }

    function renderTable(type) {
        const data = type === '3d' ? currentData.sdCompare : currentData.pl3Compare;
        const filteredData = data.slice(-filters[type]).reverse();
        const compareType = compareTabs[type];
        renderStats(type, filteredData);
        renderQimaPosStats(type, filteredData);
        if (type === 'pl3') {
            const thead = document.getElementById('pl3-table-head');
            thead.innerHTML = compareType === 'sanma'
                ? '<tr><th>三码预测</th><th>实际开奖</th><th>匹配结果</th></tr>'
                : '<tr><th>七码预测</th><th>实际开奖</th><th>匹配结果</th></tr>';
        }
        const tbody = $(type, 'table-body');
        tbody.innerHTML = '';
        if (filteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="loading">暂无数据</td></tr>';
            renderQimaPosStats(type, filteredData);
            adjustPredictTable(type);
            return;
        }
        filteredData.forEach(item => {
            const isMatch = compareType === 'sanma'
                ? checkMatch(item.aiHm, item.realHm)
                : checkDingWeiMatch(item.aiDingWeiHm, item.realHm);
            const matchText = isMatch ? '✓ 命中' : '✗ 未命中';
            const row = document.createElement('tr');
            const realBalls = item.realHm ? formatBalls(item.realHm.split('').join(',')) : '-';
            if (type === '3d') {
                row.innerHTML = `
                    <td>${compareType === 'sanma' ? formatBalls(item.aiHm) : formatDingWei(item.aiDingWeiHm)}</td>
                    <td>${realBalls}</td>
                    <td class="${isMatch ? 'success' : 'fail'}">${matchText}</td>`;
            } else {
                row.innerHTML = `
                    <td>${compareType === 'sanma' ? formatBalls(item.aiHm) : formatDingWei(item.aiDingWeiHm)}</td>
                    <td>${realBalls}</td>
                    <td class="${isMatch ? 'success' : 'fail'}">${matchText}</td>`;
            }
            tbody.appendChild(row);
        });
        adjustPredictTable(type);
    }

    function renderHistory(type) {
        const data = getHistoryData(type);
        const count = historyFilters[type];
        const filtered = count === 0 ? [...data] : data.slice(-count);
        const rows = [...filtered].reverse();
        const tbody = $(type, 'history-body');
        tbody.innerHTML = '';
        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">暂无数据</td></tr>';
            adjustHistoryTable(type);
            return;
        }
        rows.forEach(item => {
            const q1 = String(item.q1 ?? '');
            const q2 = String(item.q2 ?? '');
            const q3 = String(item.q3 ?? '');
            const sum = calcSum(q1, q2, q3);
            const span = calcSpan(q1, q2, q3);
            const bs = calcBigSmallRatio(q1, q2, q3);
            const oe = calcOddEvenRatio(q1, q2, q3);
            const balls = formatBalls([q1, q2, q3].join(','));
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="period-cell">${item.qh ?? '-'}</td>
                <td>${balls}</td>
                <td><span class="badge badge-sum">${isNaN(sum) ? '-' : sum}</span></td>
                <td><span class="badge badge-span">${span}</span></td>
                <td><span class="badge badge-ratio">${bs}</span></td>
                <td><span class="badge badge-ratio">${oe}</span></td>`;
            tbody.appendChild(row);
        });
        adjustHistoryTable(type);
    }

    function runTracker(type) {
        const input = $(type, 'track-number').value.trim();
        if (!/^\d{3}$/.test(input)) {
            alert('请输入完整的三位数（000-999）');
            return;
        }
        const periods = parseInt($(type, 'track-periods').value, 10);
        const data = getHistoryData(type);
        if (data.length === 0) {
            alert('暂无开奖历史数据');
            return;
        }

        const startIndex = periods === 0 ? 0 : Math.max(0, data.length - periods);
        const exactMatches = [];
        const groupMatches = [];

        for (let i = data.length - 1; i >= startIndex; i--) {
            const item = data[i];
            const drawStr = toDrawStr(item);
            if (drawStr.length !== 3) continue;
            const distance = data.length - 1 - i;
            if (isExactMatch(drawStr, input)) {
                exactMatches.push({ item, distance });
            } else if (isGroupMatch(drawStr, input)) {
                groupMatches.push({ item, distance });
            }
        }

        renderTrackerTable(type, 'exact', exactMatches, input);
        renderTrackerTable(type, 'group', groupMatches, input);
        renderTrackerMeta(type, 'exact', exactMatches);
        renderTrackerMeta(type, 'group', groupMatches);

        const summaryEl = $(type, 'tracker-summary');
        summaryEl.style.display = 'grid';
        const exactNearest = exactMatches.length ? (exactMatches[0].distance === 0 ? '当期' : exactMatches[0].distance + ' 期前') : '—';
        const groupNearest = groupMatches.length ? (groupMatches[0].distance === 0 ? '当期' : groupMatches[0].distance + ' 期前') : '—';
        summaryEl.innerHTML = `
            <div class="summary-item"><div class="val">${input}</div><div class="lbl">查询号码</div></div>
            <div class="summary-item"><div class="val">${exactMatches.length}</div><div class="lbl">直选出现次数</div></div>
            <div class="summary-item"><div class="val">${exactNearest}</div><div class="lbl">直选最近距当期</div></div>
            <div class="summary-item"><div class="val">${groupMatches.length}</div><div class="lbl">组选出现次数</div></div>
            <div class="summary-item"><div class="val">${groupNearest}</div><div class="lbl">组选最近距当期</div></div>
        `;
    }

    function updateLastUpdateTime() {
        const now = new Date();
        document.getElementById('last-update').textContent =
            '最后更新: ' + now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
    }

    async function loadData() {
        try {
            const response = await fetch('/data');
            if (!response.ok) throw new Error('网络响应异常: ' + response.status);
            currentData = await response.json();

            renderLatest('3d', currentData.sd?.length ? currentData.sd[currentData.sd.length - 1] : null);
            renderLatest('pl3', currentData.pl3?.length ? currentData.pl3[currentData.pl3.length - 1] : null);
            renderTable('3d');
            renderTable('pl3');
            if (sections['3d'] === 'history') renderHistory('3d');
            if (sections['pl3'] === 'history') renderHistory('pl3');
            updateLastUpdateTime();
            adjustAllTables();
        } catch (error) {
            console.error('加载数据失败:', error);
            document.getElementById('sd-table-body').innerHTML =
                '<tr><td colspan="3" class="error-message">数据加载失败，请刷新重试</td></tr>';
            document.getElementById('pl3-table-body').innerHTML =
                '<tr><td colspan="3" class="error-message">数据加载失败，请刷新重试</td></tr>';
        }
    }

    window.onload = function() {
        loadData();
        window.addEventListener('resize', () => adjustAllTables());
    };

    window.onbeforeunload = function() {
        ['3d', 'pl3'].forEach(type => {
            if (autoRefreshIntervals[type]) clearInterval(autoRefreshIntervals[type]);
        });
    };
</script>
</body>
</html>
